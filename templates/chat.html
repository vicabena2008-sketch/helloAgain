<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HelloAgain AI — Shop Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
html{background:#000;}
body{
  font-family:'Inter',sans-serif;background:#0f0e17;
  display:flex;flex-direction:column;height:100vh;
  margin:0 auto;max-width:800px;width:100%;
  border-left:1px solid #1e293b;border-right:1px solid #1e293b;
  position:relative;
}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4338ca 100%);
  padding:14px 24px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
  z-index:10;flex-shrink:0;
}
.header-logo{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;color:#fff;
  border:2px solid rgba(255,255,255,0.25);
}
.header-info{flex:1;}
.header-title{font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:-0.2px;}
.header-sub{font-size:0.72rem;color:#a5b4fc;margin-top:2px;display:flex;align-items:center;gap:5px;}
.online-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.clear-btn{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  color:#c7d2fe;font-size:0.78rem;font-weight:500;
  padding:7px 14px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .2s;
}
.clear-btn:hover{background:rgba(255,255,255,0.18);color:#fff;}

/* ── CHAT AREA ── */
.chat-area{
  flex:1;overflow-y:auto;
  padding:24px 16px 12px;
  display:flex;flex-direction:column;gap:18px;
  background:linear-gradient(180deg,#0d0c1d 0%,#0f172a 100%);
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:4px;}
.chat-area::-webkit-scrollbar-thumb{background:#334155;border-radius:999px;}

/* ── MESSAGES ── */
.msg-row{display:flex;align-items:flex-end;gap:10px;animation:fadeUp .3s ease;}
.msg-row.user{flex-direction:row-reverse;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;font-weight:700;
}
.avatar.ai{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;}
.avatar.user{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;}

.msg-col{display:flex;flex-direction:column;max-width:72%;}
.msg-row.user .msg-col{align-items:flex-end;}

.bubble{
  padding:12px 16px;border-radius:18px;
  font-size:.9rem;line-height:1.6;word-break:break-word;
}
.bubble.ai{
  background:#1e293b;color:#e2e8f0;
  border-bottom-left-radius:4px;
  border:1px solid #334155;
}
.bubble.user{
  background:linear-gradient(135deg,#4f46e5,#6d28d9);
  color:#fff;border-bottom-right-radius:4px;
}
.msg-time{font-size:.65rem;color:#475569;margin-top:4px;padding:0 4px;}

.msg-img{
  margin-top:10px;border-radius:12px;max-width:220px;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);display:block;
}

/* ── TYPING INDICATOR ── */
.typing-row{display:flex;align-items:flex-end;gap:10px;}
.typing-bubble{
  background:#1e293b;border:1px solid #334155;
  border-radius:18px;border-bottom-left-radius:4px;
  padding:14px 18px;display:flex;gap:5px;align-items:center;
}
.typing-bubble span{
  width:7px;height:7px;background:#4f46e5;border-radius:50%;
  animation:bounce 1.1s infinite ease-in-out;
}
.typing-bubble span:nth-child(2){animation-delay:.18s;}
.typing-bubble span:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-7px);}}

/* ── WELCOME CARD ── */
.welcome-card{
  background:linear-gradient(135deg,#1e1b4b,#312e81);
  border:1px solid #4338ca;border-radius:16px;
  padding:24px 28px;text-align:center;
  margin:0 auto;max-width:460px;
}
.welcome-card .wc-icon{font-size:2rem;margin-bottom:10px;color:#a5b4fc;}
.welcome-card h2{font-size:1.1rem;font-weight:700;color:#e0e7ff;margin-bottom:6px;}
.welcome-card p{font-size:.82rem;color:#a5b4fc;line-height:1.65;}

/* ── QUICK STARTERS ── */
.starters-wrap{
  flex-shrink:0;background:#0f172a;
  padding:10px 16px 12px;
  display:flex;flex-wrap:wrap;gap:8px;
  border-top:1px solid #1e293b;
}
.chip{
  background:#1e293b;border:1.5px solid #334155;
  color:#a5b4fc;font-size:.76rem;font-weight:500;
  padding:6px 14px;border-radius:999px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.chip:hover{background:#4f46e5;color:#fff;border-color:#4f46e5;transform:translateY(-1px);}

/* ── INPUT AREA ── */
.input-area{
  flex-shrink:0;background:#0f172a;
  border-top:1px solid #1e293b;
  padding:14px 18px;
  display:flex;align-items:flex-end;gap:12px;
}
.input-box{
  flex:1;background:#1e293b;border:1.5px solid #334155;
  border-radius:14px;padding:12px 16px;
  font-family:'Inter',sans-serif;font-size:.9rem;color:#e2e8f0;
  outline:none;resize:none;max-height:110px;line-height:1.5;
  transition:border-color .2s;
}
.input-box:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12);}
.input-box::placeholder{color:#475569;}
.send-btn{
  width:46px;height:46px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#4f46e5,#6d28d9);
  color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.send-btn:hover{transform:scale(1.1);box-shadow:0 4px 18px rgba(79,70,229,.45);}
.send-btn:active{transform:scale(.95);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo"><i class="fa-solid fa-robot"></i></div>
  <div class="header-info">
    <div class="header-title">HelloAgain AI</div>
    <div class="header-sub">
      <span class="online-dot"></span>
      <span>Smart Shop Assistant &nbsp;·&nbsp; Nigeria</span>
    </div>
  </div>
  <button class="clear-btn" onclick="clearChat()">
    <i class="fa-solid fa-broom"></i> Clear
  </button>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="welcome-card">
    <div class="wc-icon"><i class="fa-solid fa-bag-shopping"></i></div>
    <h2>Welcome to HelloAgain AI</h2>
    <p>Your smart shopping assistant for Tech, Fashion, Food, Home Appliances &amp; Beauty. Ask me anything — I'm here to help you find exactly what you need.</p>
  </div>
</div>

<!-- QUICK STARTER CHIPS -->
<div class="starters-wrap" id="startersWrap">
  <button class="chip" onclick="sendStarter(this)">Phone under NGN 150,000</button>
  <button class="chip" onclick="sendStarter(this)">Smart TV in stock?</button>
  <button class="chip" onclick="sendStarter(this)">Laptop for student, NGN 400k</button>
  <button class="chip" onclick="sendStarter(this)">Snacks for events</button>
  <button class="chip" onclick="sendStarter(this)">Deliver to Abuja?</button>
  <button class="chip" onclick="sendStarter(this)">Samsung for 150k?</button>
  <button class="chip" onclick="sendStarter(this)">Payment methods?</button>
  <button class="chip" onclick="sendStarter(this)">Bulk / wholesale pricing</button>
</div>

<!-- INPUT AREA -->
<div class="input-area">
  <textarea class="input-box" id="msgBox" rows="1"
    placeholder="Type your message…"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <i class="fa-solid fa-paper-plane"></i>
  </button>
</div>

<script>
const chatArea  = document.getElementById('chatArea');
const msgBox    = document.getElementById('msgBox');
const sendBtn   = document.getElementById('sendBtn');
const startersW = document.getElementById('startersWrap');

function now(){
  return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function scrollDown(){
  chatArea.scrollTop = chatArea.scrollHeight;
}

function appendMsg(text, role, imageUrl){
  const isUser = role === 'user';
  const row    = document.createElement('div');
  row.className= `msg-row ${role}`;

  const avatarIcon = isUser ? 'fa-user' : 'fa-robot';
  const avatarCls  = isUser ? 'user' : 'ai';
  const bubbleCls  = isUser ? 'user' : 'ai';

  let imgHtml = '';
  if(imageUrl){
    imgHtml = `<img class="msg-img" src="${imageUrl}" alt="Product" onerror="this.style.display='none'"/>`;
  }

  row.innerHTML = `
    <div class="avatar ${avatarCls}"><i class="fa-solid ${avatarIcon}"></i></div>
    <div class="msg-col">
      <div class="bubble ${bubbleCls}">${escHtml(text)}${imgHtml}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  chatArea.appendChild(row);
  scrollDown();
}

function showTyping(){
  const el = document.createElement('div');
  el.className='typing-row'; el.id='typing';
  el.innerHTML=`
    <div class="avatar ai"><i class="fa-solid fa-robot"></i></div>
    <div class="typing-bubble"><span></span><span></span><span></span></div>`;
  chatArea.appendChild(el); scrollDown();
}

function hideTyping(){ const el=document.getElementById('typing'); if(el) el.remove(); }

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\n/g,'<br/>');
}

async function sendMessage(){
  const text = msgBox.value.trim();
  if(!text) return;
  msgBox.value=''; msgBox.style.height='auto';
  startersW.style.display='none';
  sendBtn.disabled=true;

  appendMsg(text,'user',null);
  showTyping();

  try{
    const res  = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text})
    });
    const data = await res.json();
    hideTyping();
    appendMsg(data.reply || 'Sorry, something went wrong.','ai', data.image_url||null);
  }catch(e){
    hideTyping();
    appendMsg('Connection error — please try again.','ai',null);
  }
  sendBtn.disabled=false;
  msgBox.focus();
}

function sendStarter(el){
  msgBox.value = el.textContent;
  sendMessage();
}

async function clearChat(){
  await fetch('/api/clear',{method:'POST'});
  chatArea.innerHTML=`
    <div class="welcome-card">
      <div class="wc-icon"><i class="fa-solid fa-bag-shopping"></i></div>
      <h2>Welcome to HelloAgain AI</h2>
      <p>Your smart shopping assistant for Tech, Fashion, Food, Home Appliances &amp; Beauty.</p>
    </div>`;
  startersW.style.display='flex';
}

// Auto-resize textarea
msgBox.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,110)+'px';
});

// Enter to send (Shift+Enter for newline)
msgBox.addEventListener('keydown',function(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
