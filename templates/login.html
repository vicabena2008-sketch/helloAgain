<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — HelloAgain AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#0f0e17 0%,#1e1b4b 50%,#0f172a 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.card{
  background:#fff;border-radius:20px;
  width:100%;max-width:420px;
  padding:48px 40px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
}
.logo{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;color:#fff;margin:0 auto 20px;
}
h1{font-size:1.4rem;font-weight:800;color:#0f172a;text-align:center;margin-bottom:4px;}
.subtitle{font-size:.82rem;color:#64748b;text-align:center;margin-bottom:28px;}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#fef3c7;border:1px solid #fcd34d;
  color:#92400e;font-size:.72rem;font-weight:600;
  padding:4px 10px;border-radius:999px;
  margin:0 auto 28px;display:flex;width:fit-content;
}
label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:6px;}
.field{
  border:1.5px solid #e2e8f0;border-radius:10px;
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;margin-bottom:16px;
  transition:border-color .2s;
}
.field:focus-within{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12);}
.field i{color:#94a3b8;width:16px;text-align:center;}
.field input{
  border:none;outline:none;flex:1;
  font-family:'Inter',sans-serif;font-size:.9rem;color:#0f172a;
  background:transparent;
}
.error{
  background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;
  color:#991b1b;font-size:.82rem;padding:10px 14px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.login-btn{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#4f46e5,#6d28d9);
  color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;
  transition:all .2s;margin-top:4px;
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,.4);}
.login-btn:active{transform:translateY(0);}
.footer-note{text-align:center;font-size:.72rem;color:#94a3b8;margin-top:20px;}
@media (max-width: 480px) {
  .card{padding:30px 20px;}
  h1{font-size:1.25rem;}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><i class="fa-solid fa-shield-halved"></i></div>
  <h1>Admin Dashboard</h1>
  <p class="subtitle">HelloAgain AI — Private Access</p>
  <div class="badge">
    <i class="fa-solid fa-lock"></i> Restricted — Authorised Personnel Only
  </div>

  {% if error %}
  <div class="error"><i class="fa-solid fa-circle-xmark"></i> {{ error }}</div>
  {% endif %}

  <form method="POST">
    <label for="username">Username</label>
    <div class="field">
      <i class="fa-solid fa-user"></i>
      <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username"/>
    </div>
    <label for="password">Password</label>
    <div class="field">
      <i class="fa-solid fa-key"></i>
      <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password"/>
    </div>
    <button type="submit" class="login-btn">
      <i class="fa-solid fa-arrow-right-to-bracket" style="margin-right:8px;"></i>Sign In
    </button>
  </form>
  <p class="footer-note">HelloAgain AI &copy; 2024 &nbsp;·&nbsp; Nigeria</p>
</div>
</body>
</html>
